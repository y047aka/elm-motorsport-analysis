name: Playwright Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      update-snapshots:
        description: 'Update VRT snapshots'
        type: boolean
        default: false
jobs:
  test:
    if: ${{ !inputs.update-snapshots }}
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx -w app playwright install --with-deps chromium
      - name: Run Playwright tests
        run: npm run -w app test
        env:
          CI: true
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: app/playwright-report/
          retention-days: 30

  update-snapshots:
    if: ${{ inputs.update-snapshots }}
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx -w app playwright install --with-deps chromium
      - name: Update snapshots
        run: npx -w app playwright test --update-snapshots
        env:
          CI: true
      - uses: actions/upload-artifact@v4
        with:
          name: updated-snapshots
          path: app/tests/example.spec.ts-snapshots/
          retention-days: 30
