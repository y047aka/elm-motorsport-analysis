name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      update-snapshots:
        description: 'Update VRT snapshots'
        type: boolean
        default: false
      branch:
        description: 'Target branch to push updated snapshots (e.g. PR branch name)'
        type: string
        default: ''

jobs:
  test:
    if: ${{ !inputs.update-snapshots }}
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
      - name: Install dependencies
        run: npm ci
      - uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('app/package.json') }}
      - name: Install Playwright Browsers
        run: npx -w app playwright install --with-deps chromium
      - name: Run Playwright tests
        run: npm run -w app test
        env:
          CI: true
      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: app/playwright-report/
          retention-days: 30
      - name: Comment PR on VRT failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const url = `https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## VRT 失敗\nPlaywright レポート: ${url}`
            });

  update-snapshots:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.update-snapshots }}
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
      - name: Install dependencies
        run: npm ci
      - uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('app/package.json') }}
      - name: Install Playwright Browsers
        run: npx -w app playwright install --with-deps chromium
      - name: Update snapshots
        run: npx -w app playwright test --update-snapshots
        env:
          CI: true
      - name: Push updated snapshots to branch
        if: inputs.branch != ''
        env:
          BRANCH: ${{ inputs.branch }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/tests/example.spec.ts-snapshots/
          git diff --cached --quiet || git commit -m "chore: update VRT snapshots"
          git push origin HEAD:"$BRANCH"
      - uses: actions/upload-artifact@v7
        with:
          name: updated-snapshots
          path: app/tests/example.spec.ts-snapshots/
          retention-days: 30
