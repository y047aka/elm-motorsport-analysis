name: Update VRT Snapshots

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Target branch to push updated snapshots (e.g. PR branch name)'
        type: string
        default: ''

jobs:
  update-snapshots:
    timeout-minutes: 60
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@v16
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
      - name: Install dependencies
        run: nix develop --command pnpm install --frozen-lockfile
      - name: Update snapshots
        run: nix run .#update-snapshots-vrt
        env:
          CI: true
      - name: Push updated snapshots to branch
        if: inputs.branch != ''
        env:
          BRANCH: ${{ inputs.branch }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/tests/example.spec.ts-snapshots/
          git diff --cached --quiet || git commit -m "chore: update VRT snapshots"
          git push origin HEAD:"$BRANCH"
      - uses: actions/upload-artifact@v7
        with:
          name: updated-snapshots
          path: app/tests/example.spec.ts-snapshots/
          retention-days: 30
