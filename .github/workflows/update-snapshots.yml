name: Update VRT Snapshots

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Target branch to push updated snapshots (e.g. PR branch name)'
        type: string
        default: ''

jobs:
  update-snapshots:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@v16
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('app/package.json') }}
      - name: Install Playwright system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libnss3 libnspr4 libatk1.0-0t64 libatk-bridge2.0-0t64 \
            libcups2t64 libdrm2 libxkbcommon0 libatspi2.0-0t64 \
            libxcomposite1 libxdamage1 libxfixes3 libxrandr2 \
            libgbm1 libpango-1.0-0 libcairo2 libasound2t64
      - name: Install Playwright Browsers
        run: pnpm --filter app exec playwright install chromium
      - name: Update snapshots
        run: nix develop --command pnpm --filter app exec playwright test --update-snapshots
        env:
          CI: true
      - name: Push updated snapshots to branch
        if: inputs.branch != ''
        env:
          BRANCH: ${{ inputs.branch }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/tests/example.spec.ts-snapshots/
          git diff --cached --quiet || git commit -m "chore: update VRT snapshots"
          git push origin HEAD:"$BRANCH"
      - uses: actions/upload-artifact@v7
        with:
          name: updated-snapshots
          path: app/tests/example.spec.ts-snapshots/
          retention-days: 30
